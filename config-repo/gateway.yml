spring:
  cloud:
    gateway:
      default-filters:
        - PreserveHostHeader
      routes:
        - id: product-composite-actuator
          uri: lb://product-composite-service
          predicates:
            - Path=/product-composite/actuator/**
          filters:
            - RewritePath=/product-composite/actuator/(?<segment>.*), /actuator/$\{segment}
        - id: product-composite
          uri: lb://product-composite-service
          predicates:
            - Path=/product-composite/**
        - id: openapi
          uri: lb://product-composite-service
          predicates:
            - Path=/openapi/**
        - id: config
          uri: http://${app.config-server}:8888
          predicates:
            - Path=/config/**
          filters:
            - RewritePath=/config/(?<segment>.*), /$\{segment}
        - id: eureka-api
          uri: http://${app.eureka-server}:8761
          predicates:
            - Path=/eureka/api/{segment}
          filters:
            - SetPath=/eureka/{segment}
            - AddRequestHeader=Authorization, Basic ${app.eureka-auth}
        - id: eureka-web-start
          uri: http://${app.eureka-server}:8761
          predicates:
            - Path=/eureka/web
          filters:
            - SetPath=/
            - AddRequestHeader=Authorization, Basic ${app.eureka-auth}
        - id: eureka-web-other
          uri: http://${app.eureka-server}:8761
          predicates:
            - Path=/eureka/**
          filters:
            - AddRequestHeader=Authorization, Basic ${app.eureka-auth}

server:
  port: 8443
  ssl:
    key-store: classpath:keystore/edge.p12
    key-store-password: password
    key-store-type: PKCS12
    key-alias: localhost

app:
  config-server: localhost
  eureka-server: localhost
  eureka-username: eureka
  eureka-password: password
  eureka-auth: ZXVyZWthOnBhc3N3b3Jk

management:
  endpoint:
    health:
      show-details: "ALWAYS"
    gateway:
      enabled: true
  endpoints:
    web:
      exposure:
        include: "*"

logging:
  level:
    root: INFO
    org.springframework.cloud.gateway.route.RouteDefinitionRouteLocator: INFO
    org.springframework.cloud.gateway: TRACE

---
spring.config.activate.on-profile: docker
app.config-server: config
app.eureka-server: eureka
