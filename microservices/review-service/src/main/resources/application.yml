spring:
  application:
    name: review-service
  cloud:
    stream:
      defaultBinder: rabbit
      default.contentType: application/json
      bindings:
        messageProcessor-in-0:
          destination: reviews
          group: reviewsGroup
      rabbit:
        bindings:
          messageProcessor-in-0:
            consumer:
              auto-bind-dlq: true
              republish-to-dlq: true
      kafka:
        binder:
          brokers: 127.0.0.1
          defaultBrokerPort: 9092

server:
  port: 7003

management.endpoint.health.show-details: "ALWAYS"
management.endpoints.web.exposure.include: "*"

app:
  eureka-username: eureka
  eureka-password: password

eureka:
  client:
    serviceUrl:
      defaultZone: http://${app.eureka-username}:${app.eureka-password}@localhost:8761/eureka/
    initialInstanceInfoReplicationIntervalSeconds: 5
    registryFetchIntervalSeconds: 5
  instance:
    leaseRenewalIntervalInSeconds: 5
    leaseExpirationDurationInSeconds: 5

logging:
  level:
    root: INFO
    se.magnus.microservices: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

spring.jpa.hibernate.ddl-auto: update
spring.datasource:
  url: jdbc:mysql://localhost/review-db
  username: user
  password: pwd
spring.datasource.hikari.initializationFailTimeout: 60000

spring.rabbitmq:
  host: 127.0.0.1
  port: 5672
  username: guest
  password: guest

---
spring.config.activate.on-profile: docker
server.port: 8080
spring.rabbitmq.host: rabbitmq
spring.cloud.stream.kafka.binder.brokers: kafka
spring.datasource:
  url: jdbc:mysql://mysql/review-db
eureka.client.serviceUrl.defaultZone: http://${app.eureka-username}:${app.eureka-password}@eureka:8761/eureka/
